name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  binary:
    name: Build binary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libleptonica-dev libtesseract-dev tesseract-ocr-eng \
            libgtk-4-dev libadwaita-1-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: cargo build --release

      - name: Package binary
        run: |
          cd target/release
          tar czf ../../rustylens-linux-x86_64.tar.gz rustylens

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary
          path: rustylens-linux-x86_64.tar.gz

  flatpak:
    name: Build Flatpak
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-49
      options: --privileged
    steps:
      - uses: actions/checkout@v4

      - name: Build Flatpak bundle
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          manifest-path: io.github.pranavk_official.RustyLens.json
          bundle: rustylens.flatpak
          cache-key: flatpak-builder-${{ github.sha }}

      - name: Upload Flatpak artifact
        uses: actions/upload-artifact@v4
        with:
          name: flatpak
          path: rustylens.flatpak

  appimage:
    name: Build AppImage
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm base-devel rustup clang wget file \
            gtk4 libadwaita leptonica tesseract tesseract-data-eng \
            glib2 gdk-pixbuf2 librsvg pango adwaita-icon-theme \
            fuse2

          rustup default stable

      - name: Build release binary
        run: cargo build --release

      - name: Create AppDir
        run: |
          APP_ID="io.github.pranavk_official.RustyLens"
          ARCH="$(uname -m)"
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/metainfo
          mkdir -p AppDir/usr/share/icons/hicolor/scalable/apps

          # Install binary
          install -Dm755 target/release/rustylens AppDir/usr/bin/rustylens

          # Install desktop file and icon
          cp "data/${APP_ID}.desktop" "AppDir/usr/share/applications/${APP_ID}.desktop"
          cp "data/${APP_ID}.metainfo.xml" "AppDir/usr/share/metainfo/${APP_ID}.metainfo.xml"
          cp "data/icons/hicolor/scalable/apps/${APP_ID}.svg" "AppDir/usr/share/icons/hicolor/scalable/apps/${APP_ID}.svg"

          # Symlinks at AppDir root (required by AppImage spec)
          cp "data/${APP_ID}.desktop" AppDir/
          cp "data/icons/hicolor/scalable/apps/${APP_ID}.svg" AppDir/

      - name: Download linuxdeploy
        run: |
          ARCH="$(uname -m)"
          wget -q "https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-${ARCH}.AppImage" -O linuxdeploy
          chmod +x linuxdeploy

      - name: Build AppImage
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
          NO_STRIP: "1"
        run: |
          APP_ID="io.github.pranavk_official.RustyLens"
          ARCH="$(uname -m)"
          GTK_LIBDIR="$(pkg-config --variable=libdir gtk4)"

          # Bundle Adwaita icon theme for libadwaita
          mkdir -p AppDir/usr/share/icons
          cp -r /usr/share/icons/Adwaita AppDir/usr/share/icons/ 2>/dev/null || true
          cp -r /usr/share/icons/hicolor AppDir/usr/share/icons/ 2>/dev/null || true

          # Bundle GTK4 modules and GDK pixbuf loaders
          if [ -d "${GTK_LIBDIR}/gtk-4.0" ]; then
            mkdir -p AppDir/usr/lib/gtk-4.0
            cp -r "${GTK_LIBDIR}/gtk-4.0/"* AppDir/usr/lib/gtk-4.0/
          fi
          mkdir -p AppDir/usr/lib/gdk-pixbuf-2.0
          cp -r "${GTK_LIBDIR}/gdk-pixbuf-2.0/"* AppDir/usr/lib/gdk-pixbuf-2.0/ 2>/dev/null || true
          GDK_PIXBUF_MODULEDIR=AppDir/usr/lib/gdk-pixbuf-2.0/2.10.0/loaders \
            gdk-pixbuf-query-loaders > AppDir/usr/lib/gdk-pixbuf-2.0/2.10.0/loaders.cache 2>/dev/null || true

          # Compile GLib schemas
          mkdir -p AppDir/usr/share/glib-2.0/schemas
          cp /usr/share/glib-2.0/schemas/*.xml AppDir/usr/share/glib-2.0/schemas/ 2>/dev/null || true
          glib-compile-schemas AppDir/usr/share/glib-2.0/schemas/

          # Create custom AppRun with GTK/GLib env vars
          cat > AppRun << 'APPRUN'
          #!/bin/bash
          SELF="$(readlink -f "$0")"
          HERE="${SELF%/*}"
          export PATH="${HERE}/usr/bin:${PATH}"
          export LD_LIBRARY_PATH="${HERE}/usr/lib:${LD_LIBRARY_PATH}"
          export XDG_DATA_DIRS="${HERE}/usr/share:${XDG_DATA_DIRS:-/usr/share}"
          export GSETTINGS_SCHEMA_DIR="${HERE}/usr/share/glib-2.0/schemas"
          export GDK_PIXBUF_MODULE_FILE="${HERE}/usr/lib/gdk-pixbuf-2.0/2.10.0/loaders.cache"
          export GTK_PATH="${HERE}/usr/lib/gtk-4.0"
          export GTK_IM_MODULE_FILE=""
          export GSK_RENDERER="${GSK_RENDERER:-ngl}"
          exec "${HERE}/usr/bin/rustylens" "$@"
          APPRUN
          chmod +x AppRun

          ./linuxdeploy \
            --appdir AppDir \
            --executable target/release/rustylens \
            --desktop-file "data/${APP_ID}.desktop" \
            --icon-file "data/icons/hicolor/scalable/apps/${APP_ID}.svg" \
            --custom-apprun AppRun \
            --output appimage

          # Rename only if needed (linuxdeploy may already use the correct name)
          if [ ! -f "RustyLens-${ARCH}.AppImage" ]; then
            mv *.AppImage "RustyLens-${ARCH}.AppImage"
          fi

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: appimage
          path: "*.AppImage"

  release:
    name: Publish release
    needs: [binary, flatpak, appimage]
    if: always() && contains(needs.*.result, 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract changelog for this version
        id: changelog
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          BODY=$(awk "/^## \[${TAG}\]/{found=1; next} /^## \[/{found=0} found" CHANGELOG.md)
          if [ -z "$BODY" ]; then
            BODY="Release ${TAG}"
          fi
          echo "$BODY" > release_body.md

      - name: Download binary artifact
        if: needs.binary.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: binary

      - name: Download Flatpak artifact
        if: needs.flatpak.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: flatpak

      - name: Download AppImage artifact
        if: needs.appimage.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: appimage

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_body.md
          files: |
            rustylens-linux-x86_64.tar.gz
            rustylens.flatpak
            RustyLens-*.AppImage
          fail_on_unmatched_files: false
